<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>Aura</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100vw;
    height: 100vh;
    background: transparent;
    overflow: hidden;
    pointer-events: none;
    user-select: none;
    -webkit-user-select: none;
  }
  .glow {
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(
        ellipse at center,
        transparent 72%,
        rgba(255, 43, 214, 0.15) 86%,
        rgba(255, 43, 214, 0.55) 100%
      );
    box-shadow:
      inset 0 0 90px 10px rgba(255, 43, 214, 0.55),
      inset 0 0 24px 2px rgba(255, 43, 214, 0.8);
    animation: breathe 2.4s ease-in-out infinite;
    will-change: opacity;
  }
  @keyframes breathe {
    0%, 100% { opacity: 0.45; }
    50%      { opacity: 0.95; }
  }
</style>
</head>
<body>
  <div class="glow"></div>
</body>
</html>
