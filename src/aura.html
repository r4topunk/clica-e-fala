<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>Aura</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100vw;
    height: 100vh;
    background: transparent;
    overflow: hidden;
    pointer-events: none;
    user-select: none;
    -webkit-user-select: none;
  }
  .glow {
    --c: 255, 43, 214;
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(
        ellipse at center,
        transparent 72%,
        rgba(var(--c), 0.15) 86%,
        rgba(var(--c), 0.55) 100%
      );
    box-shadow:
      inset 0 0 90px 10px rgba(var(--c), 0.55),
      inset 0 0 24px 2px rgba(var(--c), 0.8);
    animation: breathe 2.4s ease-in-out infinite;
    will-change: opacity;
    transition: --c 200ms linear;
  }
  @keyframes breathe {
    0%, 100% { opacity: 0.45; }
    50%      { opacity: 0.95; }
  }
</style>
</head>
<body>
  <div class="glow"></div>
  <script>
    const COLORS = {
      recording:    '255, 43, 214',
      processing:   '255, 176, 32',
      transcribing: '34, 211, 238',
      refining:     '57, 255, 20',
    };
    const glow = document.querySelector('.glow');
    window.__applyAuraPhase = (phase) => {
      const c = COLORS[phase];
      if (c) glow.style.setProperty('--c', c);
    };
    if (window.__auraPhase) window.__applyAuraPhase(window.__auraPhase);
  </script>
</body>
</html>
